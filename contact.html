<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #121212, #000000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contact-container {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(6.5px);
            -webkit-backdrop-filter: blur(6.5px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 30px;
            width: 50%;
            text-align: center;
        }

        /* Social Icons Styling */
        .social-icons {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: white;
            font-size: 28px;
            transition: transform 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        .social-icons a:hover {
            transform: scale(1.2);
            color: #ff6b81;
        }

        /* Form Input Styling */
        .form-control {
            background: rgba(255, 255, 255, 0.73);
            color: rgba(255, 255, 255, 0);
            border: none;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Button Styling */
        .btn-custom {
            background-color: #ff6b81;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease-in-out;
        }

        .btn-custom:hover {
            background-color: #ff4757;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-black fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">My Portfolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end bg-dark text-light" id="offcanvasNav">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">Menu</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link text-light" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="projects.html">Projects</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="education.html">Education</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="achievements.html">Achievements</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="Srilakshmi_H_Resume.pdf" download>Resume</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="contact-container">
        <h2>Contact Me</h2>
        <p>Feel free to reach out to me!</p>
        
        <!-- Social Links -->
        <div class="social-icons">
            <a href="mailto:srilaksh04@gmail.com" title="Email"><i class="fas fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/srilakshmi-h-0b405b25b/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/Srilakshmi2717" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        </div>

        <!-- Contact Form -->
        <form>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Your Email" required>
            </div>
            <div class="mb-3">
                <textarea class="form-control" rows="4" placeholder="Your Message" required></textarea>
            </div>
            <button type="submit" class="btn-custom">Send Message</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
